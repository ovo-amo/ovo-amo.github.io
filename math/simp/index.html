<!DOCTYPE HTML>
<html>

<head>
    <title>UHS Math Club SIMP 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bitmaks/cm-web-fonts@latest/fonts.css">
    <link rel="icon" type="image/png" href="../../images/logo.png">

    <noscript>
        <link rel="stylesheet" href="../../assets/css/noscript.css" />
    </noscript>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        // Apply dark mode immediately to prevent flash
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', function () {
                document.body.classList.add('dark-mode');
            });
        }
    </script>
</head>

<body class="is-preload">
    <!-- Wrapper -->
    <div id="wrapper">

        <!-- Header -->
        <header id="header">
            <h1>SIMP 2026</h1>
            <p><i>UHS Math Club</i></p>
        </header>


        <!-- Main -->
        <div id="main">

            <!-- Content -->
            <section id="content" class="main">
                <h1 id="instructions">enter your access code</h1>
                <input type="password" id="code" autocomplete="off" style="margin-bottom: 1em">
                <ul class="actions">
                    <li><a onclick="let d = new Date();d.setTime(d.getTime() + (2 * 60 * 60 * 1000));this.parentElement.parentElement.outerHTML=`<p>Click <a href='https://drive.google.com/file/d/1` + code.value[0] + `K4nrwP0hIeRD2rfELbifTEClBODGbY4/view?usp=sharing'>here</a> to access your SIMP, or <a href='https://drive.google.com/file/d/1GWLNXmkPKUA0DKJr2ZLoay1Nu6PNLZI` + code.value[0] + `/view?usp=sharing'>here</a> if you require an IUSD-shareable link. You must submit your solutions by <b>${d.toLocaleDateString()}</b> at <b>${d.toLocaleTimeString()}</b>, which is in 120 minutes (a grace period of 40 minutes because there are also instructions in the SIMP). Starting now, though, there is to be no Googling or AIing or any other shenanigans.</p><br><p><b>YOU ARE RESPONSIBLE FOR TIMING YOURSELF. BE HONEST ABOUT WHEN YOU START AND WHEN YOU END. ONCE YOU OPEN THE FILE, THERE ARE THREE PAGES OF INSTRUCTIONS. YOU START THE TIME ONCE YOU READ THOSE INSTRUCTIONS.</b></p>`;instructions.textContent=`good luck!`;code.remove()"
                            class="button">Submit</a></li>
                </ul>
            </section>

        </div>

        <!-- Footer -->
        <footer id="footer">
        </footer>

    </div>

    <!-- Dark Mode Toggle -->
    <div id="dark-mode-toggle" onclick="toggleDarkMode()">&#x00AC;</div>

    <!-- Scripts -->
    <script src="../../assets/js/jquery.min.js"></script>
    <script src="../../assets/js/jquery.scrollex.min.js"></script>
    <script src="../../assets/js/jquery.scrolly.min.js"></script>
    <script src="../../assets/js/browser.min.js"></script>
    <script src="../../assets/js/breakpoints.min.js"></script>
    <script src="../../assets/js/util.js"></script>
    <script src="../../assets/js/main.js"></script>

</body>

</html>
