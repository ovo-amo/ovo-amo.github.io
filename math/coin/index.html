<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="../../images/logo.png">
    <title>UHS Math Club Coin Game</title>
</head>
<body>
    <button id="dark-mode-toggle" title="Toggle Dark Mode">
        <span class="material-icons-outlined">dark_mode</span>
    </button>
    <div class="wrapper">
        <header>
            <h1>COIN GAME</h1>
            <button class="replay-header" id="replay-header" title="Restart Game">
                <span class="material-icons-outlined">replay</span>
            </button>
        </header>

        <div class="settings">
            <div class="setting-group">
                <label for="mode-select">Opponent:</label>
                <select id="mode-select">
                    <option value="bot">Random</option>
                    <option value="pvp">Yourself</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="col-count">Columns:</label>
                <input type="number" id="col-count" value="10" min="3" max="25" />
            </div>
        </div>

        <div class="status-container">
            <h2 id="status-text">Your Turn</h2>
        </div>

        <div class="game-area">
            <div class="board" id="board"></div>
            <div class="col-buttons" id="col-buttons"></div>
        </div>

        <footer>UHS Math Club 2026</footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
