<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>MIT PRIMES-USA 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="icon" type="image/png" href="../../images/logo.png">

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true}] });"></script>
</head>
<body>
    <script src="../../assets/js/menubar.js" data-base="../.."></script>

    <div class="layout-container">
        <!-- Sidebar Header -->
        <header class="site-header">
            <div class="brand">
                <h1>MIT PRIMES-USA 2026</h1>
                <p>with Shengtao (Alex) Ding and Max Levin (mentored by <a href="https://lugroup.yale.edu">Dr. Lu Lu</a> and <a href="https://yixiangd.github.io/">Dr. Yixiang Deng</a>)</p>
            </div>
            <nav class="site-nav">
                <ul id="dynamic-nav"></ul>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <section id="content" class="section-block">
                <h2 class="section-title">Research Focus</h2>
                <div class="card">
                    <p>We study clinical applications of machine learning.</p>
                </div>
            </section>
        </main>
    </div>
    <!-- Scripts -->
    <script src="../../assets/js/nav.js"></script>
</body>
</html>
