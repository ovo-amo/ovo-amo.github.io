<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>404 | Page Not Found</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="icon" type="image/png" href="/images/logo.png">

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true}] });"></script>
</head>
<body>
    <!-- Information: Hamburger Menu -->
    <script src="/assets/js/menubar.js" data-base=""></script>

    <div class="layout-container">
        <!-- Sidebar Header -->
        <header class="site-header">
            <div class="brand">
                <h1>404</h1>
                <p>Error: Proof Not Found</p>
            </div>
            <nav class="site-nav">
                <ul>
                    <li><a href="/">Home</a></li>
                </ul>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <section class="section-block">
                <h2 class="section-title">Page Not Found</h2>
                <div class="card">
                    <p>You received a redo because your proof could not be found.</p>
                    <div class="card-actions">
                        <a href="/" class="btn btn-primary">Return to Axioms (Home)</a>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
